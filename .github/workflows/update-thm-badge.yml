name: Update TryHackMe Badge

on:
  schedule:
    - cron: '0 0 * * *'   # Roda todo dia à meia-noite UTC
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Fetch TryHackMe Badge
        uses: geeekgod/tryhackme-badge-action@v1.0
        with:
          image_path: './assets/badge.png'
          username: 'gabrielvmaia'
          user_id: '69ae09c385974454ae8b1cb6'
          committer_username: 'Gabriel-V-Maia'
          committer_email: 'gabrielvinicius.damaia@gmail.com'
          commit_message: 'ci: updated THM profile badge'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
