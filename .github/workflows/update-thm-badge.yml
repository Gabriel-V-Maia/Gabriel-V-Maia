name: Update TryHackMe Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: p4p1/tryhackme-badge-workflow@main
        with:
          username: "gabrielvmaia"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
