name: Update TryHackMe Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Fetch TryHackMe Badge
        uses: Gabriel-V-Maia/tryhackme-badge-action@main
        with:
          image_path: './assets/badge.png'
          username: 'gabrielvmaia'
          user_id: '7118340'
          committer_username: 'Gabriel-V-Maia'
          committer_email: 'gabrielvinicius.damaia@gmail.com'
          commit_message: 'ci: updated THM profile badge'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

